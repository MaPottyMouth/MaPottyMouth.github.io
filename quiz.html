<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz | Save Humaine</title>
    <link href="https://fonts.googleapis.com/css2?family=Agbalumo&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --fond: #fff8ef; --save-vert: #4d6d2a; --humaine-brun: #412b1a; }
        body { font-family: 'Open Sans', sans-serif; background-color: var(--fond); color: var(--humaine-brun); margin: 0; text-align: center; }
        header { background: white; padding: 1.5rem; border-bottom: 3px solid var(--save-vert); }
        .logo-save { font-family: 'Agbalumo', cursive; color: var(--save-vert); font-size: 2rem; }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .question { display: none; }
        .active { display: block; animation: fadeIn 0.5s; }
        .btn-choice { background: white; border: 2px solid var(--save-vert); color: var(--save-vert); padding: 15px; width: 100%; margin: 10px 0; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.3s; }
        .btn-choice:hover { background: var(--save-vert); color: white; }
        #resultat { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="logo-save">Save Humaine</div>
</header>

<div class="container">
    <div id="q1" class="question active">
        <h3>1. Dans 10 ans, ta société est une réussite. Qu'est-ce qui te rend la plus fière ?</h3>
        <button class="btn-choice" onclick="select(['Empire', 'Equilibre'], 'q1', 'q2')">Une structure solide et reconnue</button>
        <button class="btn-choice" onclick="select(['Pedagogue', 'Inspirateur'], 'q1', 'q2')">Une communauté où le savoir circule</button>
        <button class="btn-choice" onclick="select(['Connecteur', 'Cooperatif'], 'q1', 'q2')">Un réseau de partenaires et d'amis</button>
        <button class="btn-choice" onclick="select(['Nomade', 'Gardien'], 'q1', 'q2')">Un mode de vie libre, sans attaches</button>
    </div>

    <div id="q5" class="question">
        <h3>Depuis combien de temps bâtis-tu ton projet ?</h3>
        <button class="btn-choice" onclick="setBranch('debutant')">Phase de conception (0-3 ans)</button>
        <button class="btn-choice" onclick="setBranch('etabli')">Structure debout (3-5 ans)</button>
        <button class="btn-choice" onclick="setBranch('expert')">Expansion (+5 ans)</button>
    </div>

    <div id="resultat">
        <h2 style="font-family: 'Agbalumo'; color: var(--save-vert);">Ton Profil de Sève</h2>
        <h1 id="profil-titre"></h1>
        <p id="profil-desc"></p>
        <a href="index.html" style="color: var(--save-vert); font-weight: bold;">Retour à l'accueil</a>
    </div>
</div>

<script>
    let scores = { Nomade: 0, Connecteur: 0, Inspirateur: 0, Equilibre: 0, Empire: 0, Pedagogue: 0, Cooperatif: 0, Gardien: 0 };
    let branche = "";

    function select(profils, current, next) {
        profils.forEach(p => scores[p]++);
        document.getElementById(current).classList.remove('active');
        document.getElementById(next).classList.add('active');
    }

    function setBranch(b) {
        branche = b;
        // Pour l'instant, on saute directement au résultat pour tester le moteur
        // Plus tard, on redirigera vers les questions spécifiques de la branche
        afficherResultat();
    }

    function afficherResultat() {
        document.getElementById('q5').classList.remove('active');
        const gagnant = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        document.getElementById('resultat').style.display = 'block';
        document.getElementById('profil-titre').innerText = gagnant;
        document.getElementById('profil-desc').innerText = "Tu as une dominante " + gagnant + ". On va bientôt ajouter les conseils personnalisés pour ta branche " + branche + " !";
    }
</script>

</body>
</html>
