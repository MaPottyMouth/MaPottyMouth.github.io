<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Humaine | Quiz Bâtisseuse</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Agbalumo&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --fond: #fff8ef; 
            --save-vert: #4d6d2a; 
            --humaine-brun: #412b1a; 
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background-color: var(--fond); 
            color: var(--humaine-brun); 
            margin: 0; padding: 0; 
            line-height: 1.6;
        }

        header { 
            background-color: white;
            padding: 3rem 1rem; 
            text-align: center; 
            border-bottom: 3px solid var(--save-vert);
        }

        /* Design du Logo */
        .logo-save { 
            font-family: 'Agbalumo', system-ui; 
            color: var(--save-vert); 
            font-size: 4rem; 
            line-height: 1;
        }
        .logo-humaine { 
            font-family: 'Open Sans', sans-serif; 
            color: var(--humaine-brun); 
            text-transform: uppercase; 
            font-weight: 700; 
            letter-spacing: 5px;
            font-size: 1.2rem;
            display: block;
            margin-top: 5px;
        }

        nav { margin-bottom: 30px; }
        nav a { 
            color: var(--save-vert); 
            text-decoration: none; 
            font-weight: bold; 
            border: 2px solid var(--save-vert); 
            padding: 8px 20px; 
            border-radius: 25px; 
            font-size: 0.9rem;
            transition: 0.3s;
        }
        nav a:hover {
            background-color: var(--save-vert);
            color: white;
        }

        .container { 
            max-width: 700px; 
            width: 90%; 
            margin: 40px auto; 
            padding: 30px; 
            background: white;
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(65, 43, 26, 0.08); 
            text-align: center;
        }

        .question { display: none; }
        .question.active { display: block; animation: fadeIn 0.5s; }

        button.quiz-btn { 
            background-color: var(--save-vert); 
            color: white; 
            border: none; 
            padding: 15px 25px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-family: 'Open Sans', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            margin: 10px 0;
            transition: 0.3s;
        }
        button.quiz-btn:hover { 
            background-color: var(--humaine-brun);
            transform: scale(1.02);
        }

        #resultat { display: none; padding: 20px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <nav>
        <a href="apropos.html">Qui suis-je ?</a>
    </nav>
    <div class="logo-save">Save</div>
    <div class="logo-humaine">Humaine</div>
    <p style="margin-top: 20px; font-style: italic;">Bâtir avec la sève, pas seulement avec les briques.</p>
</header>

<div class="container">
    <div id="quiz">
        <div class="question active" id="q1">
            <h3>1. Sur un chantier, qu'est-ce qui t'inquiète le plus ?</h3>
            <button class="quiz-btn" onclick="next('q1', 'q2', 'Sève')">Que l'équipe perde sa motivation et son sens.</button>
            <button class="quiz-btn" onclick="next('q1', 'q2', 'Structure')">Que les délais et les plans ne soient pas respectés.</button>
        </div>

        <div class="question" id="q2">
            <h3>2. Face à un imprévu majeur, ta réaction est...</h3>
            <button class="quiz-btn" onclick="next('q2', 'q3', 'Bascule')">Chercher une solution radicale.</button>
            <button class="quiz-btn" onclick="next('q2', 'q3', 'Structure')">Analyser les données logiquement.</button>
        </div>

        <div class="question" id="q3">
            <h3>3. Comment aimerais-tu être décrite ?</h3>
            <button class="quiz-btn" onclick="next('q3', 'fin', 'Humain')">Empathique et à l'écoute.</button>
            <button class="quiz-btn" onclick="next('q3', 'fin', 'Sève')">Visionnaire et inspirante.</button>
        </div>

        <div id="resultat">
            <h2>Profil dominant : <span id="profil-nom"></span></h2>
            <p id="profil-desc"></p>
            <button class="quiz-btn" onclick="location.reload()">Recommencer</button>
        </div>
    </div>
</div>

<script>
    let scores = { Sève: 0, Structure: 0, Bascule: 0, Humain: 0 };

    function next(currentId, nextId, point) {
        scores[point]++;
        document.getElementById(currentId).classList.remove('active');
        if (nextId === 'fin') { afficherResultat(); } 
        else { document.getElementById(nextId).classList.add('active'); }
    }

    function afficherResultat() {
        const gagnant = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        document.getElementById('resultat').style.display = 'block';
        document.getElementById('profil-nom').innerText = gagnant;
        const desc = {
            'Sève': "Tu es le moteur émotionnel du projet.",
            'Structure': "Tu es la garante de la solidité technique.",
            'Bascule': "Tu es l'agente du changement radical.",
            'Humain': "Tu veilles sur chaque personne du chantier."
        };
        document.getElementById('profil-desc').innerText = desc[gagnant];
    }
</script>

</body>
</html>
