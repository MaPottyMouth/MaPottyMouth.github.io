<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Humaine | Quiz Bâtisseuse</title>
    <style>
        :root { --primary: #e67e22; --dark: #2c3e50; --bg: #fdfaf5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; margin: 0; padding: 0; line-height: 1.6; }
        header { background: var(--dark); color: white; padding: 3rem 1rem; text-align: center; }
        .container { max-width: 700px; width: 90%; background: white; margin: -40px auto 40px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .question { display: none; }
        .question.active { display: block; animation: fadeIn 0.5s; }
        button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; margin: 10px 5px; width: 100%; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #d35400; transform: translateY(-2px); }
        #resultat { display: none; text-align: center; padding: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <nav style="margin-top: 15px;">
    <a href="apropos.html" style="color: white; text-decoration: none; font-weight: bold; border: 1px solid white; padding: 5px 15px; border-radius: 20px;">Qui suis-je ?</a>
</nav>
    <h1>SAVE HUMAINE</h1>
    <p>Découvre quelle bâtisseuse sommeille en toi.</p>
</header>

<div class="container">
    <div id="quiz">
        <div class="question active" id="q1">
            <h3>1. Sur un chantier (ou dans un projet), qu'est-ce qui t'inquiète le plus ?</h3>
            <button onclick="next('q1', 'q2', 'Sève')">Que l'équipe perde sa motivation et son sens.</button>
            <button onclick="next('q1', 'q2', 'Structure')">Que les délais et les plans ne soient pas respectés.</button>
        </div>

        <div class="question" id="q2">
            <h3>2. Face à un imprévu majeur (le "Mur"), ta réaction est...</h3>
            <button onclick="next('q2', 'q3', 'Bascule')">Chercher une solution radicale, quitte à tout changer.</button>
            <button onclick="next('q2', 'q3', 'Structure')">Analyser les données pour trouver la faille logique.</button>
        </div>

        <div class="question" id="q3">
            <h3>3. Comment aimerais-tu que les gens te décrivent ?</h3>
            <button onclick="next('q3', 'fin', 'Humain')">Comme une personne empathique qui écoute vraiment.</button>
            <button onclick="next('q3', 'fin', 'Sève')">Comme une visionnaire qui redonne du souffle.</button>
        </div>

        <div id="resultat">
            <h2>Ton profil dominant : <span id="profil-nom"></span></h2>
            <p id="profil-desc"></p>
            <button onclick="location.reload()">Recommencer le test</button>
        </div>
    </div>
</div>

<script>
    let scores = { Sève: 0, Structure: 0, Bascule: 0, Humain: 0 };

    function next(currentId, nextId, point) {
        scores[point]++;
        document.getElementById(currentId).classList.remove('active');
        
        if (nextId === 'fin') {
            afficherResultat();
        } else {
            document.getElementById(nextId).classList.add('active');
        }
    }

    function afficherResultat() {
        const gagnant = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        document.getElementById('resultat').style.display = 'block';
        document.getElementById('profil-nom').innerText = gagnant;
        
        const descriptions = {
            'Sève': "Tu es le moteur émotionnel, celle qui rappelle pourquoi on construit.",
            'Structure': "Tu es la garante de la solidité, rien n'échappe à ta rigueur.",
            'Bascule': "Tu es l'agente du changement, tu n'as pas peur de déconstruire pour mieux rebâtir.",
            'Humain': "Tu es le cœur du projet, tu veilles à ce que personne ne soit oublié en route."
        };
        document.getElementById('profil-desc').innerText = descriptions[gagnant];
    }
</script>

</body>
</html>
